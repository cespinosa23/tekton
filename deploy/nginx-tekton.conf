server {
    listen 80;
    server_name _;          # matches any hostname / IP

    # ── React SPA ────────────────────────────────────────────
    root /var/www/tekton;
    index index.html;

    # All non-API routes go to the SPA (handles React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite-built assets are content-hashed — safe to cache long-term
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── FastAPI backend (strips /api prefix before forwarding) ─
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }
}
